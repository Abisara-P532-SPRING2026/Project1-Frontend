<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSimulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row header-row-top">
                <div class="header-left">
                    <h1>TradeSimulator</h1>
                    <button type="button" id="notification-badge" class="notification-badge" title="Alerts (click to clear count)"></button>
                </div>
                <div class="header-controls">
                    <label for="user-select">User:</label>
                    <select id="user-select"></select>
                    <label for="strategy-select">Strategy:</label>
                    <select id="strategy-select">
                        <option value="random">random</option>
                        <option value="mean-reversion">mean-reversion</option>
                        <option value="trend-following">trend-following</option>
                    </select>
                </div>
            </div>
            <div class="header-row header-row-summary">
                <span class="cash">Cash: <strong id="cash">$0.00</strong></span>
                <span class="total">Portfolio: <strong id="totalValue">$0.00</strong></span>
            </div>
        </header>

        <main>
            <section class="card">
                <h2>Notify me when trades execute (this user)</h2>
                <div class="notif-channels">
                    <label><input type="checkbox" id="notif-console" value="CONSOLE"> Console / log</label>
                    <label><input type="checkbox" id="notif-email" value="EMAIL"> Email (mock)</label>
                    <label><input type="checkbox" id="notif-sms" value="SMS"> SMS (mock)</label>
                    <label><input type="checkbox" id="notif-dashboard" value="DASHBOARD"> Dashboard alert + badge</label>
                </div>
            </section>

            <section class="card">
                <h2>Market Prices</h2>
                <table id="prices-table">
                    <thead>
                        <tr><th>Stock</th><th>Price</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Holdings</h2>
                <table id="holdings-table">
                    <thead>
                        <tr><th>Stock</th><th>Qty</th><th>Value</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Place Order</h2>
                <form id="order-form">
                    <select id="order-type" name="type">
                        <option value="MARKET">Market</option>
                        <option value="LIMIT">Limit</option>
                    </select>
                    <select id="side" name="side">
                        <option value="BUY">Buy</option>
                        <option value="SELL">Sell</option>
                    </select>
                    <input type="text" id="stock" name="stock" placeholder="Stock" required>
                    <input type="number" id="quantity" name="quantity" placeholder="Qty" min="1" required>
                    <input type="number" id="limit-price" name="limitPrice" placeholder="Limit $ (limit only)" min="0" step="0.01" disabled>
                    <button type="submit">Submit</button>
                </form>
                <p id="order-message" class="message"></p>
            </section>

            <section class="card">
                <h2>Pending Orders</h2>
                <table id="pending-table">
                    <thead>
                        <tr><th>Type</th><th>Stock</th><th>Side</th><th>Qty</th><th>Limit</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Trade History</h2>
                <table id="history-table">
                    <thead>
                        <tr><th>Time</th><th>Stock</th><th>Side</th><th>Qty</th><th>Price</th><th>Total</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="card">
                <h2>Dashboard Alerts</h2>
                <ul id="alerts-list"></ul>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
